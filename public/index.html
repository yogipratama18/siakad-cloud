<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAKAD — Sistem Informasi Akademik</title>
<style>
  :root {
    --primary: #1a56db;
    --primary-dark: #1240a8;
    --primary-light: #e8f0fe;
    --secondary: #0f766e;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --info: #0891b2;
    --bg: #f3f4f6;
    --card: #ffffff;
    --sidebar: #1e293b;
    --sidebar-active: #334155;
    --text: #111827;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 2px 12px rgba(0,0,0,0.06);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e293b 0%, #1a56db 100%);
  }
  .login-box {
    background: #fff;
    border-radius: 18px;
    padding: 2.5rem 2.8rem;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18);
  }
  .login-logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2rem;
  }
  .login-logo .icon {
    width: 48px; height: 48px;
    background: var(--primary);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #fff;
  }
  .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  .login-logo p { font-size: 12px; color: var(--text-muted); }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px;
    transition: border-color .2s;
    background: #fafafa;
    font-family: var(--font);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--primary);
    background: #fff; box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .15s; font-family: var(--font);
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: #e9ebee; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }
  .login-roles { display: flex; gap: 8px; margin-bottom: 1.4rem; }
  .role-btn {
    flex: 1; padding: 10px;
    border: 2px solid var(--border); border-radius: 8px;
    background: #fff; cursor: pointer; text-align: center;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    transition: all .15s;
  }
  .role-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
  .alert-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
  .alert-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }

  /* APP LAYOUT */
  #app { display: none; min-height: 100vh; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; background: var(--sidebar); color: #fff;
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    transition: transform .3s;
  }
  .sidebar-header {
    padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-logo {
    width: 36px; height: 36px; background: var(--primary);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .sidebar-title { font-size: 15px; font-weight: 700; }
  .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
  .nav-section { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    color: rgba(255,255,255,0.7); font-size: 13.5px; font-weight: 500;
    transition: all .15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: var(--primary); color: #fff; }
  .nav-item .icon { font-size: 16px; width: 20px; flex-shrink: 0; }
  .sidebar-footer {
    padding: 12px 8px; border-top: 1px solid rgba(255,255,255,0.08);
  }
  .user-info {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
  }
  .user-info:hover { background: rgba(255,255,255,0.08); }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .user-name { font-size: 13px; font-weight: 600; color: #fff; }
  .user-role { font-size: 11px; color: rgba(255,255,255,0.5); }

  /* MAIN CONTENT */
  .main { margin-left: 240px; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 17px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  }
  .badge-primary { background: var(--primary-light); color: var(--primary); }
  .badge-success { background: #f0fdf4; color: var(--success); }
  .badge-warning { background: #fffbeb; color: var(--warning); }
  .badge-danger { background: #fef2f2; color: var(--danger); }
  .badge-info { background: #ecfeff; color: var(--info); }
  .content { flex: 1; padding: 24px; }

  /* CARDS */
  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-body { padding: 20px; }

  /* STAT CARDS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .stat-card {
    background: #fff; border-radius: var(--radius);
    padding: 20px; border: 1px solid var(--border);
    box-shadow: var(--shadow); display: flex; gap: 16px; align-items: flex-start;
  }
  .stat-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th { padding: 10px 14px; background: #f8fafc; font-weight: 700; color: var(--text-muted); text-align: left; border-bottom: 2px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr:last-child td { border-bottom: none; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px; backdrop-filter: blur(2px);
  }
  .modal {
    background: #fff; border-radius: 16px;
    width: 100%; max-width: 520px; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 18px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: #fff; z-index: 1;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 22px; }
  .modal-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .close-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted); line-height: 1; padding: 4px; border-radius: 4px; }
  .close-btn:hover { background: var(--bg); }

  /* GRID LAYOUT */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .gap-16 { gap: 16px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
  .flex { display: flex; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .flex-gap { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* SEARCH BAR */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .search-input {
    flex: 1; min-width: 200px; padding: 9px 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13.5px; background: #fff; font-family: var(--font);
    transition: border-color .2s;
  }
  .search-input:focus { outline: none; border-color: var(--primary); }

  /* GRADE TABLE */
  .grade-cell { 
    font-weight: 700; font-size: 14px;
    width: 40px; height: 30px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .g-a { background: #f0fdf4; color: #16a34a; }
  .g-b { background: #eff6ff; color: #2563eb; }
  .g-c { background: #fffbeb; color: #d97706; }
  .g-d { background: #fff7ed; color: #ea580c; }
  .g-e { background: #fef2f2; color: #dc2626; }

  /* CHART */
  .chart-container { position: relative; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding: 0 4px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { border-radius: 6px 6px 0 0; min-width: 20px; transition: opacity .2s; cursor: default; }
  .bar:hover { opacity: 0.8; }
  .bar-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .bar-value { font-size: 11px; font-weight: 700; }

  /* SEMESTER SELECTOR */
  .sem-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .sem-tab {
    flex: 1; min-width: 80px; padding: 7px 12px; border-radius: 7px;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; text-align: center; transition: all .15s;
  }
  .sem-tab.active { background: #fff; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  /* BACKUP */
  .backup-card {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 28px; text-align: center; cursor: pointer; transition: all .2s;
  }
  .backup-card:hover { border-color: var(--primary); background: var(--primary-light); }
  .backup-icon { font-size: 40px; margin-bottom: 12px; }
  .backup-list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .backup-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .backup-item:last-child { border-bottom: none; }
  .backup-item:hover { background: #f8fafc; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .topbar { padding: 0 14px; }
    .content { padding: 14px; }
  }

  /* PILL TAGS */
  .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill-blue { background: #eff6ff; color: #2563eb; }
  .pill-green { background: #f0fdf4; color: #16a34a; }
  .pill-orange { background: #fff7ed; color: #ea580c; }
  .pill-purple { background: #faf5ff; color: #7c3aed; }
  .pill-gray { background: #f3f4f6; color: #4b5563; }

  /* PROGRESS BAR */
  .progress { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 4px; transition: width .6s; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    color: #fff; z-index: 9999; display: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    animation: slideIn .3s ease;
  }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .toast-success { background: var(--success); }
  .toast-danger { background: var(--danger); }
  .toast-info { background: var(--primary); }

  /* PROFILE CARD */
  .profile-header {
    background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
    padding: 28px; color: #fff; border-radius: var(--radius) var(--radius) 0 0;
    display: flex; align-items: center; gap: 20px;
  }
  .profile-avatar { width: 72px; height: 72px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; }
  .profile-name { font-size: 22px; font-weight: 800; }
  .profile-sub { font-size: 13px; opacity: 0.8; }

  /* TRANSCRIPT */
  .transcript-header { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
  .transcript-header h2 { font-size: 18px; font-weight: 800; }
  .gpa-display { font-size: 40px; font-weight: 900; color: var(--primary); }
  .gpa-label { font-size: 13px; color: var(--text-muted); font-weight: 600; }

  /* PAGE SECTIONS */
  .page { display: none; }
  .page.active { display: block; }

  /* CHART LEGEND */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
</style>
</head>

<!-- LOGIN -->

  <div class="login-box">

      <div class="icon">🎓</div>

</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-logo">🎓</div>

          <div class="sidebar-title">SIAKAD</div>

            <div class="user-name" id="user-name">Admin</div>
            <div class="user-role" id="user-role">Administrator</div>
          </div>
        </div>
        <div class="nav-item" onclick="doLogout()" style="color:#f87171">
          <span class="icon">🚪</span> Keluar
        </div>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="btn btn-secondary btn-sm" style="display:none" id="menu-toggle">☰</button>
          <div class="topbar-title" id="page-title">Dashboard</div>
        </div>
        <div class="topbar-right">
          <span style="font-size:12px;color:var(--text-muted)">Semester Ganjil 2024/2025</span>
          <div class="badge badge-success">🟢 Online</div>
        </div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box"></div>
</div>
<div id="toast"></div>

// ========== AUTH ==========
let currentUser = null;
let currentRole = 'admin';
let currentPage = 'dashboard';

function setRole(r) {
  currentRole = r;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('role-'+r.replace('mahasiswa','mhs')).classList.add('active');
  const defaults = { admin:['admin','admin123'], dosen:['dosen','dosen123'], mahasiswa:['mahasiswa','mhs123'] };
  document.getElementById('login-user').value = defaults[r][0];
  document.getElementById('login-pass').value = defaults[r][1];
}

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  const user = DB.users.find(x => x.id === u && x.pass === p);
  if (!user) {
    showAlert('login-alert','Username atau password salah!','danger');
    return;
  }
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name').textContent = user.nama;
  document.getElementById('user-role').textContent = user.role === 'admin' ? 'Administrator' : user.role === 'dosen' ? 'Dosen' : 'Mahasiswa';
  document.getElementById('user-avatar').textContent = user.nama[0];
  document.getElementById('user-avatar').style.background = user.color;
  buildNav();
  navigate('dashboard');
}

function doLogout() {
  if (!confirm('Yakin ingin keluar?')) return;
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-alert').style.display = 'none';
}

function showAlert(id, msg, type='danger') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert alert-'+type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ========== HELPERS ==========
function getGradeClass(g) {
  if (!g) return 'g-e';
  if (g.startsWith('A')) return 'g-a';
  if (g.startsWith('B')) return 'g-b';
  if (g.startsWith('C')) return 'g-c';
  if (g.startsWith('D')) return 'g-d';
  return 'g-e';
}
function calcGrade(na) {
  if (na >= 85) return 'A';
  if (na >= 80) return 'A-';
  if (na >= 75) return 'B+';
  if (na >= 70) return 'B';
  if (na >= 65) return 'B-';
  if (na >= 60) return 'C+';
  if (na >= 55) return 'C';
  if (na >= 50) return 'D';
  return 'E';
}
function calcNA(row) {
  return Math.round(row.uts * 0.30 + row.uas * 0.40 + row.tugas * 0.20 + row.hadir * 0.10);
}
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast-'+type;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay') || !e)
    document.getElementById('modal-overlay').style.display = 'none';
}
function closeModalBtn() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function renderMhsRows(data, canEdit) {
  return data.map(m => `<tr>
    <td><span class="pill pill-blue">${m.nim}</span></td>
    <td><div style="font-weight:600">${m.nama}</div><div style="font-size:12px;color:var(--text-muted)">${m.email}</div></td>
    <td><span class="pill pill-purple">${m.prodi}</span></td>
    <td>Sem ${m.semester}</td>
    <td><span style="font-weight:700;color:var(--primary)">${m.ipk}</span></td>
    <td><span class="badge ${m.status==='aktif'?'badge-success':'badge-warning'}">${m.status}</span></td>
    ${canEdit ? `<td><div class="actions">
      <button class="btn btn-secondary btn-sm" onclick="modalDetailMhs('${m.nim}')">👁 Detail</button>
      <button class="btn btn-primary btn-sm" onclick="modalEditMhs('${m.nim}')">✏ Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMhs('${m.nim}')">🗑</button>

  </tr>`).join('') || '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Tidak ada data</td></tr>';
}

function filterMhs() {
  const q = document.getElementById('mhs-search').value.toLowerCase();
  const pr = document.getElementById('mhs-prodi').value;
  const filtered = DB.mahasiswa.filter(m =>
    (m.nama.toLowerCase().includes(q) || m.nim.includes(q)) && (!pr || m.prodi === pr)

  document.getElementById('mhs-table').innerHTML = renderMhsRows(filtered, currentUser.role !== 'mahasiswa');

pages.matakuliah = function() {
  const canEdit = currentUser.role !== 'mahasiswa';
  return `
  <div class="search-bar">
    <input class="search-input" id="mk-search" placeholder="🔍  Cari mata kuliah..." oninput="filterMK()">
    <select class="search-input" id="mk-prodi" style="max-width:200px" onchange="filterMK()">
      <option value="">Semua Prodi</option>
      ${[...new Set(DB.matakuliah.map(m=>m.prodi))].map(p=>`<option>${p}</option>`).join('')}
    </select>
    ${canEdit ? `<button class="btn btn-primary" onclick="modalTambahMK()">+ Tambah Mata Kuliah</button>` : ''}
  </div>
  <div class="card">
    <div class="table-wrap"><table><thead><tr><th>Kode</th><th>Nama Mata Kuliah</th><th>SKS</th><th>Program Studi</th><th>Dosen</th><th>Jadwal</th>${canEdit?'<th>Aksi</th>':''}</tr></thead>
    <tbody id="mk-table">${renderMKRows(DB.matakuliah, canEdit)}</tbody></table></div>
  </div>`;
};

function renderMKRows(data, canEdit) {
  return data.map(m => `<tr>
    <td><span class="pill pill-orange">${m.kode}</span></td>
    <td><b>${m.nama}</b></td>
    <td><span class="pill pill-blue">${m.sks} SKS</span></td>
    <td>${m.prodi}</td>
    <td>${m.dosen}</td>
    <td><span style="font-size:12px">${m.hari}, ${m.jam} · ${m.ruang}</span></td>
    ${canEdit ? `<td><div class="actions">
      <button class="btn btn-primary btn-sm" onclick="modalEditMK('${m.kode}')">✏ Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMK('${m.kode}')">🗑</button>
    </div></td>` : ''}
  </tr>`).join('') || '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Tidak ada data</td></tr>';
}

function filterMK() {
  const q = document.getElementById('mk-search').value.toLowerCase();
  const pr = document.getElementById('mk-prodi').value;
  const filtered = DB.matakuliah.filter(m => (m.nama.toLowerCase().includes(q) || m.kode.toLowerCase().includes(q)) && (!pr || m.prodi === pr));
  document.getElementById('mk-table').innerHTML = renderMKRows(filtered, currentUser.role !== 'mahasiswa');
}

function modalTambahMK() {
  openModal(`<div class="modal-header"><div class="modal-title">➕ Tambah Mata Kuliah</div><button class="close-btn" onclick="closeModalBtn()">✕</button></div>
  <div class="modal-body">
    <div class="grid-2">

    semester: +document.getElementById('mk-semester').value,

// NILAI PAGE
pages.nilai = function() {
  const isMhs = currentUser.role === 'mahasiswa';
  const nilaiData = isMhs ? DB.nilai.filter(n=>n.nim===currentUser.nim) : DB.nilai;
  return `
  <div class="search-bar">
    ${!isMhs ? `<input class="search-input" id="n-search" placeholder="🔍  Cari berdasarkan NIM/nama..." oninput="filterNilai()">` : ''}
    <select class="search-input" id="n-mk" style="max-width:220px" onchange="filterNilai()">
      <option value="">Semua Mata Kuliah</option>
      ${DB.matakuliah.map(m=>`<option value="${m.kode}">${m.nama}</option>`).join('')}
    </select>
    ${!isMhs ? `<button class="btn btn-primary" onclick="modalInputNilai()">+ Input Nilai</button>` : ''}
  </div>
  <div class="card">
    <div class="table-wrap"><table><thead><tr>${!isMhs?'<th>NIM</th><th>Mahasiswa</th>':''}<th>Mata Kuliah</th><th>UTS (30%)</th><th>UAS (40%)</th><th>Tugas (20%)</th><th>Hadir (10%)</th><th>Nilai Akhir</th><th>Grade</th>${!isMhs?'<th>Aksi</th>':''}</tr></thead>
    <tbody id="nilai-table">${renderNilaiRows(nilaiData, isMhs)}</tbody></table></div>
  </div>`;
};

function renderNilaiRows(data, isMhs) {
  return data.map(n => {
    const mhs = DB.mahasiswa.find(m=>m.nim===n.nim);
    const mk = DB.matakuliah.find(m=>m.kode===n.kode);
    return `<tr>
      ${!isMhs?`<td><span class="pill pill-blue">${n.nim}</span></td><td><b>${mhs?mhs.nama:'-'}</b></td>`:''}
      <td>${mk?mk.nama:n.kode}</td>
      <td>${n.uts}</td><td>${n.uas}</td><td>${n.tugas}</td>
      <td>${n.hadir}%</td>
      <td><b style="font-size:15px">${n.nilai_akhir}</b></td>
      <td><span class="grade-cell ${getGradeClass(n.grade)}">${n.grade}</span></td>
      ${!isMhs?`<td><div class="actions">
        <button class="btn btn-primary btn-sm" onclick="modalEditNilai('${n.nim}','${n.kode}')">✏ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteNilai('${n.nim}','${n.kode}')">🗑</button>
      </div></td>`:''}
    </tr>`;
  }).join('') || '<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--text-muted)">Tidak ada data nilai</td></tr>';
}

function filterNilai() {
  const isMhs = currentUser.role === 'mahasiswa';
  const q = !isMhs && document.getElementById('n-search') ? document.getElementById('n-search').value.toLowerCase() : '';
  const mk = document.getElementById('n-mk').value;
  const filtered = DB.nilai.filter(n => {
    if (isMhs && n.nim !== currentUser.nim) return false;
    const mhs = DB.mahasiswa.find(m=>m.nim===n.nim);
    const matchQ = !q || n.nim.includes(q) || (mhs && mhs.nama.toLowerCase().includes(q));
    const matchMK = !mk || n.kode === mk;
    return matchQ && matchMK;
  });
  document.getElementById('nilai-table').innerHTML = renderNilaiRows(filtered, isMhs);
}

function modalInputNilai() {
  openModal(`<div class="modal-header"><div class="modal-title">📝 Input Nilai</div><button class="close-btn" onclick="closeModalBtn()">✕</button></div>
  <div class="modal-body">
    <div class="form-group"><label>Mahasiswa</label><select id="n-nim">
      ${DB.mahasiswa.map(m=>`<option value="${m.nim}">${m.nim} - ${m.nama}</option>`).join('')}
    </select></div>
    <div class="form-group"><label>Mata Kuliah</label><select id="n-mk2">
      ${DB.matakuliah.map(m=>`<option value="${m.kode}">${m.kode} - ${m.nama}</option>`).join('')}
    </select></div>
    <div class="grid-2">
      <div class="form-group"><label>Nilai UTS (0-100)</label><input id="n-uts" type="number" min="0" max="100" value="75" oninput="previewNA()"></div>
      <div class="form-group"><label>Nilai UAS (0-100)</label><input id="n-uas" type="number" min="0" max="100" value="80" oninput="previewNA()"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Tugas (0-100)</label><input id="n-tugas" type="number" min="0" max="100" value="85" oninput="previewNA()"></div>
      <div class="form-group"><label>Kehadiran (0-100%)</label><input id="n-hadir" type="number" min="0" max="100" value="90" oninput="previewNA()"></div>
    </div>
    <div style="background:var(--primary-light);border-radius:10px;padding:14px;text-align:center;margin-top:4px">
      <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:4px">PREVIEW NILAI AKHIR</div>
      <div id="na-preview" style="font-size:32px;font-weight:900;color:var(--primary)">80</div>
      <div id="grade-preview" style="font-size:18px;font-weight:700;margin-top:2px">B</div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModalBtn()">Batal</button>
    <button class="btn btn-primary" onclick="saveNilai()">💾 Simpan</button>
  </div>`);
  previewNA();
}

function previewNA() {
  const uts = +document.getElementById('n-uts')?.value || 0;
  const uas = +document.getElementById('n-uas')?.value || 0;
  const tugas = +document.getElementById('n-tugas')?.value || 0;
  const hadir = +document.getElementById('n-hadir')?.value || 0;
  const na = Math.round(uts*0.3 + uas*0.4 + tugas*0.2 + hadir*0.1);
  const grade = calcGrade(na);
  if(document.getElementById('na-preview')) document.getElementById('na-preview').textContent = na;
  if(document.getElementById('grade-preview')) document.getElementById('grade-preview').textContent = grade;
}

function saveNilai() {
  const nim = document.getElementById('n-nim').value;
  const kode = document.getElementById('n-mk2').value;
  if (DB.nilai.find(n=>n.nim===nim&&n.kode===kode)) { alert('Nilai sudah ada! Edit data yang ada.'); return; }
  const uts = +document.getElementById('n-uts').value;
  const uas = +document.getElementById('n-uas').value;
  const tugas = +document.getElementById('n-tugas').value;
  const hadir = +document.getElementById('n-hadir').value;
  const na = Math.round(uts*0.3 + uas*0.4 + tugas*0.2 + hadir*0.1);
  DB.nilai.push({ nim, kode, uts, uas, tugas, hadir, nilai_akhir:na, grade:calcGrade(na) });
  closeModalBtn(); showToast('✅ Nilai berhasil disimpan!');
  navigate('nilai');
}

function modalEditNilai(nim, kode) {
  const n = DB.nilai.find(x=>x.nim===nim&&x.kode===kode);
  const mhs = DB.mahasiswa.find(m=>m.nim===nim);
  const mk = DB.matakuliah.find(m=>m.kode===kode);
  openModal(`<div class="modal-header"><div class="modal-title">✏ Edit Nilai</div><button class="close-btn" onclick="closeModalBtn()">✕</button></div>
  <div class="modal-body">
    <div style="background:var(--bg);border-radius:8px;padding:12px 14px;margin-bottom:16px">
      <b>${mhs?mhs.nama:nim}</b> · ${mk?mk.nama:kode}
    </div>
    <div class="grid-2">
      <div class="form-group"><label>UTS</label><input id="en-uts" type="number" min="0" max="100" value="${n.uts}" oninput="previewNA2()"></div>
      <div class="form-group"><label>UAS</label><input id="en-uas" type="number" min="0" max="100" value="${n.uas}" oninput="previewNA2()"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Tugas</label><input id="en-tugas" type="number" min="0" max="100" value="${n.tugas}" oninput="previewNA2()"></div>
      <div class="form-group"><label>Kehadiran %</label><input id="en-hadir" type="number" min="0" max="100" value="${n.hadir}" oninput="previewNA2()"></div>
    </div>
    <div style="background:var(--primary-light);border-radius:10px;padding:14px;text-align:center">
      <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:4px">NILAI AKHIR</div>
      <div id="na-preview2" style="font-size:32px;font-weight:900;color:var(--primary)">${n.nilai_akhir}</div>
      <div id="grade-preview2" style="font-size:18px;font-weight:700;margin-top:2px">${n.grade}</div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModalBtn()">Batal</button>
    <button class="btn btn-primary" onclick="updateNilai('${nim}','${kode}')">💾 Update</button>
  </div>`);
}

function previewNA2() {
  const uts = +document.getElementById('en-uts')?.value||0;
  const uas = +document.getElementById('en-uas')?.value||0;
  const tugas = +document.getElementById('en-tugas')?.value||0;
  const hadir = +document.getElementById('en-hadir')?.value||0;
  const na = Math.round(uts*0.3+uas*0.4+tugas*0.2+hadir*0.1);
  if(document.getElementById('na-preview2')) document.getElementById('na-preview2').textContent = na;
  if(document.getElementById('grade-preview2')) document.getElementById('grade-preview2').textContent = calcGrade(na);
}

function updateNilai(nim, kode) {
  const n = DB.nilai.find(x=>x.nim===nim&&x.kode===kode);
  n.uts = +document.getElementById('en-uts').value;
  n.uas = +document.getElementById('en-uas').value;
  n.tugas = +document.getElementById('en-tugas').value;
  n.hadir = +document.getElementById('en-hadir').value;
  n.nilai_akhir = Math.round(n.uts*0.3+n.uas*0.4+n.tugas*0.2+n.hadir*0.1);
  n.grade = calcGrade(n.nilai_akhir);
  closeModalBtn(); showToast('✅ Nilai berhasil diperbarui!');
  navigate('nilai');
}

function deleteNilai(nim, kode) {
  if (!confirm('Hapus data nilai ini?')) return;
  const idx = DB.nilai.findIndex(n=>n.nim===nim&&n.kode===kode);
  DB.nilai.splice(idx,1);
  showToast('🗑 Nilai dihapus!', 'info');
  navigate('nilai');
}

function renderBackupList() {
  return DB.backups.map(b => `<div class="backup-item">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:24px">${b.tipe==='otomatis'?'🤖':'👤'}</div>
      <div>
        <div style="font-weight:700;font-size:14px">${b.nama}</div>
        <div style="font-size:12px;color:var(--text-muted)">${b.waktu} · ${b.ukuran}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="badge badge-success">✅ ${b.status}</span>
      <button class="btn btn-secondary btn-sm" onclick="doRestore('${b.id}')">↩ Restore</button>
      <button class="btn btn-danger btn-sm" onclick="deleteBackup('${b.id}')">🗑</button>
    </div>
  </div>`).join('');
}

function doBackup(tipe) {
  showToast('⏳ Memproses backup...', 'info');
  setTimeout(() => {
    const now = new Date();
    const ts = now.toISOString().replace('T',' ').substring(0,19);
    DB.backups.unshift({ id:'bk'+Date.now(), nama:`Backup ${tipe==='manual'?'Manual':'Otomatis'}`, waktu:ts, ukuran:'2.5 MB', status:'sukses', tipe });
    showToast('✅ Backup berhasil dibuat!');
    navigate('backup');
  }, 1500);
}

function doRestore(id) {
  if (!confirm('Yakin ingin restore backup ini? Data saat ini akan digantikan.')) return;
  showToast('⏳ Proses restore...', 'info');
  setTimeout(() => showToast('✅ Restore berhasil!'), 2000);
}

function deleteBackup(id) {
  if (!confirm('Hapus backup ini?')) return;
  const idx = DB.backups.findIndex(b=>b.id===id);
  DB.backups.splice(idx,1);
  showToast('🗑 Backup dihapus!', 'info');
  navigate('backup');
}

function initArsitektur() {
  setTimeout(() => {
    const canvas = document.getElementById('arch-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(0, 0, W, H);

    const boxes = [
      { x:20, y:160, w:120, h:60, label:'👤 User', sub:'Browser/Mobile', color:'#e0f2fe', border:'#0891b2', text:'#0c4a6e' },
      { x:180, y:60, w:130, h:55, label:'☁️ Cloud CDN', sub:'Global Cache', color:'#fef3c7', border:'#d97706', text:'#78350f' },
      { x:180, y:145, w:130, h:55, label:'🛡 Cloud Armor', sub:'WAF/DDoS', color:'#fce7f3', border:'#db2777', text:'#831843' },
      { x:180, y:235, w:130, h:55, label:'⚖ Load Balancer', sub:'Traffic Routing', color:'#ede9fe', border:'#7c3aed', text:'#4c1d95' },
      { x:360, y:100, w:130, h:55, label:'🚀 Cloud Run', sub:'App Container', color:'#dbeafe', border:'#2563eb', text:'#1e3a8a' },
      { x:360, y:175, w:130, h:55, label:'🔑 Firebase Auth', sub:'JWT / OAuth', color:'#fef3c7', border:'#f59e0b', text:'#78350f' },
      { x:360, y:250, w:130, h:55, label:'🤖 Cloud Functions', sub:'Background Jobs', color:'#ecfdf5', border:'#16a34a', text:'#14532d' },
      { x:550, y:80, w:130, h:55, label:'🗄 Cloud SQL', sub:'PostgreSQL HA', color:'#f0fdf4', border:'#16a34a', text:'#14532d' },
      { x:550, y:160, w:130, h:55, label:'🔴 Memorystore', sub:'Redis Cache', color:'#fee2e2', border:'#dc2626', text:'#7f1d1d' },
      { x:550, y:240, w:130, h:55, label:'💾 Cloud Storage', sub:'Files & Backup', color:'#e0f2fe', border:'#0891b2', text:'#0c4a6e' },
      { x:360, y:345, w:130, h:50, label:'📊 Monitoring', sub:'Logs & Alerts', color:'#f5f3ff', border:'#7c3aed', text:'#4c1d95' },
      { x:550, y:345, w:130, h:50, label:'🔔 Cloud Pub/Sub', sub:'Event Bus', color:'#fff7ed', border:'#ea580c', text:'#7c2d12' },
    ];

    function drawBox(b) {
      ctx.save();
      ctx.fillStyle = b.color;
      ctx.strokeStyle = b.border;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, b.w, b.h, 10);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = b.text;
      ctx.font = 'bold 13px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 - 7);
      ctx.font = '11px system-ui';
      ctx.fillStyle = b.text + 'aa';
      ctx.fillText(b.sub, b.x + b.w/2, b.y + b.h/2 + 9);
      ctx.restore();
    }

    const arrows = [
      [0,2,'HTTPS'],[0,1,''],[2,3,''],[1,3,''],[3,4,'Request'],[3,5,''],[4,7,'Query'],[4,8,'Cache'],[4,9,''],[4,6,''],[5,7,'Verify'],[6,10,''],[6,11,''],[7,10,''],[11,10,''],
    ];

    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    arrows.forEach(([a, b]) => {
      const s = boxes[a], t = boxes[b];
      const sx = s.x + s.w/2, sy = s.y + s.h/2;
      const tx = t.x + t.w/2, ty = t.y + t.h/2;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(tx, ty);
      ctx.stroke();
    });
    ctx.setLineDash([]);

    boxes.forEach(drawBox);

    // Legend
    ctx.font = '11px system-ui';
    ctx.fillStyle = '#64748b';
    ctx.textAlign = 'left';
    ctx.fillText('--- = Koneksi layanan', 20, H - 10);
  }, 100);
}
