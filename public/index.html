<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAKAD — Sistem Informasi Akademik</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28' fill='none'><polygon points='14,5 26,11 14,17 2,11' fill='%232c2c2c'/><rect x='12.5' y='14' width='3' height='8' rx='1' fill='%232c2c2c'/><circle cx='22' cy='11' r='1.5' fill='%232c2c2c'/><line x1='22' y1='12.5' x2='22' y2='18' stroke='%232c2c2c' stroke-width='1.5' stroke-linecap='round'/><circle cx='22' cy='19' r='2' fill='%232c2c2c'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  /* Soft Cream & Grey Palette */
  --bg:          #f5f4f0;
  --bg2:         #eeece7;
  --card:        #fafaf8;
  --card2:       #f0ede8;
  --sidebar:     #2c2c2c;
  --sidebar2:    #383838;
  --sidebar-active: #4a4a4a;
  --text:        #1a1a1a;
  --text2:       #3d3d3d;
  --text-muted:  #888880;
  --text-light:  #b0ae a6;
  --border:      #e2dfd9;
  --border2:     #d4d1cb;

  /* Accent — warm stone */
  --accent:      #5c5c4a;
  --accent2:     #7a7a62;
  --accent-light:#f0ede6;

  /* Semantic */
  --success:     #4a7c59;
  --success-bg:  #edf4f0;
  --warning:     #8c6d3f;
  --warning-bg:  #f7f0e6;
  --danger:      #8c4a4a;
  --danger-bg:   #f7edec;
  --info:        #4a6b8c;
  --info-bg:     #edf2f7;

  --radius:      14px;
  --radius-sm:   8px;
  --radius-lg:   20px;
  --shadow:      0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg:   0 8px 32px rgba(0,0,0,0.10);
  --font:        'Inter', system-ui, sans-serif;
  --transition:  all .2s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── ANIMATED SVG ICONS ── */
.ic { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ic svg { overflow: visible; }

/* Pulse animation for status dot */
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(1.15)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes drawLine { from{stroke-dashoffset:100} to{stroke-dashoffset:0} }
@keyframes popIn { 0%{transform:scale(.8);opacity:0} 80%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

.anim-fadeup { animation: fadeUp .4s ease both; }
.anim-pop { animation: popIn .3s cubic-bezier(.4,0,.2,1) both; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  position: relative; overflow: hidden;
}
.login-deco {
  position: absolute; border-radius: 50%;
  background: var(--border); opacity: .5;
  pointer-events: none;
}
.login-deco-1 { width:400px;height:400px;top:-150px;right:-100px; }
.login-deco-2 { width:250px;height:250px;bottom:-80px;left:-60px; }
.login-deco-3 { width:120px;height:120px;bottom:100px;right:200px;background:var(--border2); }

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.8rem 3rem;
  width: 420px; max-width: 95vw;
  box-shadow: var(--shadow-lg);
  position: relative; z-index: 1;
  animation: fadeUp .5s ease;
}
.login-brand { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
.login-brand-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--sidebar);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}
.login-brand h1 { font-size: 22px; font-weight: 800; letter-spacing: -.4px; }
.login-brand p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

.role-tabs { display: flex; gap: 6px; background: var(--bg2); padding: 5px; border-radius: 12px; margin-bottom: 1.6rem; }
.role-tab {
  flex: 1; padding: 9px 8px; border-radius: 9px; border: none;
  background: transparent; cursor: pointer; font-family: var(--font);
  font-size: 12.5px; font-weight: 600; color: var(--text-muted);
  transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 5px;
}
.role-tab.active { background: var(--card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.role-tab svg { flex-shrink: 0; }

.form-group { margin-bottom: 1.1rem; }
.form-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: .01em; }
.form-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px; font-family: var(--font);
  background: var(--bg); color: var(--text);
  transition: var(--transition);
}
.form-input:focus { outline: none; border-color: var(--accent2); background: var(--card); box-shadow: 0 0 0 3px rgba(90,90,74,.1); }
.form-input::placeholder { color: var(--text-muted); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 11px 20px; border: none; border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: var(--transition); text-decoration: none;
  letter-spacing: -.01em;
}
.btn:active { transform: scale(.98); }
.btn-dark { background: var(--sidebar); color: #fff; }
.btn-dark:hover { background: var(--sidebar2); box-shadow: 0 4px 12px rgba(0,0,0,.18); }
.btn-ghost { background: var(--bg2); color: var(--text2); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-danger { background: var(--danger-bg); color: var(--danger); border: 1.5px solid #e8c9c9; }
.btn-danger:hover { background: #f0d6d5; }
.btn-success-soft { background: var(--success-bg); color: var(--success); border: 1.5px solid #c5dccb; }
.btn-success-soft:hover { background: #d8ece0; }
.btn-sm { padding: 7px 13px; font-size: 12px; border-radius: 7px; }
.btn-full { width: 100%; }
.btn-icon { width: 34px; height: 34px; padding: 0; border-radius: 8px; }

.alert { padding: 11px 15px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 1rem; }
.alert-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #e8c9c9; }

.login-hint { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 18px; line-height: 1.7; }
.login-hint code { background: var(--bg2); padding: 1px 6px; border-radius: 4px; font-size: 11px; }

/* ── LAYOUT ── */
#app { display: none; min-height: 100vh; }
.layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 240px; background: var(--sidebar); color: #fff;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar-top { padding: 20px 14px 12px; border-bottom: 1px solid rgba(255,255,255,.07); }
.sidebar-brand { display: flex; align-items: center; gap: 10px; }
.sidebar-brand-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(255,255,255,.12);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sidebar-brand-name { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
.sidebar-brand-sub { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 1px; }

.nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav::-webkit-scrollbar { width: 3px; }
.nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
.nav-section {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,.3);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 12px 10px 5px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: 9px; cursor: pointer;
  color: rgba(255,255,255,.62); font-size: 13px; font-weight: 500;
  transition: var(--transition); margin-bottom: 1px;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }
.nav-item.active { background: rgba(255,255,255,.13); color: #fff; }
.nav-item.active .nav-dot { opacity: 1; }
.nav-dot { width: 5px; height: 5px; border-radius: 50%; background: #fff; opacity: 0; margin-left: auto; transition: var(--transition); }
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-foot { padding: 10px 8px; border-top: 1px solid rgba(255,255,255,.07); }
.user-card {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: 9px; cursor: pointer;
  transition: var(--transition); margin-bottom: 2px;
}
.user-card:hover { background: rgba(255,255,255,.07); }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 12.5px; font-weight: 600; color: #fff; }
.user-role-label { font-size: 10.5px; color: rgba(255,255,255,.45); }
.nav-logout {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 12px; border-radius: 9px; cursor: pointer;
  color: rgba(255,100,100,.7); font-size: 13px; font-weight: 500;
  transition: var(--transition);
}
.nav-logout:hover { background: rgba(255,100,100,.1); color: rgba(255,120,120,.9); }

/* ── MAIN ── */
.main { margin-left: 240px; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.status-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
.status-dot span { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; display: inline-block; }
.semester-tag { font-size: 12px; color: var(--text-muted); background: var(--bg2); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }

.content { flex: 1; padding: 24px; }

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 20px; }

/* ── STAT CARDS ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  box-shadow: var(--shadow); display: flex; gap: 14px; align-items: center;
  transition: var(--transition); cursor: default;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--border2); }
.stat-icon-wrap {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
.stat-value { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -.5px; line-height: 1; }
.stat-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-sm); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 10px 14px; background: var(--bg);
  font-weight: 700; color: var(--text-muted); text-align: left;
  border-bottom: 1.5px solid var(--border);
  font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  white-space: nowrap;
}
tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:hover { background: var(--bg); }
tbody tr:last-child td { border-bottom: none; }
.actions { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

/* ── BADGES / PILLS ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-warning { background: var(--warning-bg); color: var(--warning); }
.badge-danger  { background: var(--danger-bg); color: var(--danger); }
.badge-info    { background: var(--info-bg); color: var(--info); }
.badge-neutral { background: var(--bg2); color: var(--text2); }

.pill { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 600; }
.pill-stone  { background: var(--card2); color: var(--text2); border: 1px solid var(--border); }
.pill-blue   { background: var(--info-bg); color: var(--info); }
.pill-green  { background: var(--success-bg); color: var(--success); }
.pill-amber  { background: var(--warning-bg); color: var(--warning); }
.pill-red    { background: var(--danger-bg); color: var(--danger); }

/* ── GRADE BADGES ── */
.grade-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 38px; height: 28px; border-radius: 7px;
  font-weight: 800; font-size: 12px; letter-spacing: -.2px;
}
.g-a { background: var(--success-bg); color: var(--success); }
.g-b { background: var(--info-bg); color: var(--info); }
.g-c { background: var(--warning-bg); color: var(--warning); }
.g-d { background: #f7f0e6; color: #a0693f; }
.g-e { background: var(--danger-bg); color: var(--danger); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 16px; backdrop-filter: blur(4px);
}
.modal {
  background: var(--card); border-radius: var(--radius-lg);
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.18);
  border: 1px solid var(--border);
  animation: popIn .25s cubic-bezier(.4,0,.2,1);
}
.modal-header {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--card); z-index: 1;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.modal-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.modal-body { padding: 22px; }
.modal-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.close-btn {
  background: var(--bg2); border: 1px solid var(--border);
  width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: var(--transition);
}
.close-btn:hover { background: var(--border); color: var(--text); }

/* ── FORM ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── SEARCH ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.search-wrap .form-input { padding-left: 36px; }
.filter-select { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font); background: var(--card); color: var(--text); transition: var(--transition); max-width: 180px; }
.filter-select:focus { outline: none; border-color: var(--accent2); }

/* ── PROGRESS ── */
.progress { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .8s cubic-bezier(.4,0,.2,1); }

/* ── BAR CHART ── */
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 140px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar-fill { width: 100%; border-radius: 6px 6px 0 0; transition: height .6s cubic-bezier(.4,0,.2,1); position: relative; }
.bar-fill:hover { filter: brightness(.92); cursor: default; }
.bar-num { font-size: 11px; font-weight: 700; color: var(--text2); }
.bar-lbl { font-size: 10px; font-weight: 700; color: var(--text-muted); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 12px 18px; border-radius: 11px;
  font-size: 13.5px; font-weight: 600; color: var(--card);
  z-index: 9999; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
  animation: slideIn .3s ease;
  display: none; align-items: center; gap: 8px;
  max-width: 320px;
}
.toast-success { background: var(--success); }
.toast-warning { background: var(--warning); }
.toast-danger  { background: var(--danger); }
.toast-info    { background: var(--accent); }

/* ── PROFILE HEADER ── */
.profile-hero {
  background: var(--sidebar); color: #fff; padding: 28px 24px;
  display: flex; align-items: center; gap: 18px;
}
.profile-hero-avatar {
  width: 68px; height: 68px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 900;
  border: 2.5px solid rgba(255,255,255,.2);
}
.profile-hero-name { font-size: 20px; font-weight: 800; }
.profile-hero-sub { font-size: 12.5px; color: rgba(255,255,255,.55); margin-top: 3px; }

/* ── BACKUP ── */
.backup-drop {
  border: 2px dashed var(--border2); border-radius: var(--radius);
  padding: 32px 20px; text-align: center; cursor: pointer;
  transition: var(--transition);
}
.backup-drop:hover { border-color: var(--accent2); background: var(--accent-light); }
.backup-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  transition: var(--transition);
}
.backup-list-item:hover { background: var(--bg); }
.backup-list-item:last-child { border-bottom: none; }

/* ── TRANSKRIP ── */
.transkrip-header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.transkrip-gpa { font-size: 42px; font-weight: 900; color: var(--sidebar); letter-spacing: -1px; }

/* ── UTILS ── */
.flex { display: flex; }
.flex-center { display: flex; align-items: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 12px; }
.fw-700 { font-weight: 700; }
.fw-600 { font-weight: 600; }

/* ── RESPONSIVE ── */
#mob-toggle { display: none; }
/* ══════════════════════════════════════
   RESPONSIVE MOBILE - ENHANCED
══════════════════════════════════════ */

/* Sidebar overlay for mobile */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 99;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(2px);
}
.sidebar-overlay.active { display: block; }

/* Login card mobile */
@media (max-width: 480px) {
  .login-card {
    padding: 2rem 1.4rem;
    width: 100%; max-width: 100%;
    border-radius: 0;
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    box-shadow: none;
  }
  .login-deco-1 { width:250px;height:250px;top:-80px;right:-60px; }
  .login-deco-2 { width:160px;height:160px;bottom:-40px;left:-40px; }
  .login-deco-3 { display: none; }
  .login-brand h1 { font-size: 19px; }
  .role-tab { font-size: 11.5px; padding: 8px 6px; }

@media (max-width: 768px) {
  /* Sidebar */
  .sidebar {
    transform: translateX(-100%);
    z-index: 200;
    width: 260px;
    box-shadow: 4px 0 24px rgba(0,0,0,.25);
  }
  .sidebar.open { transform: translateX(0); }

  /* Main content full width */
  .main { margin-left: 0 !important; }

  /* Topbar */
  .topbar { padding: 0 12px; height: 54px; }
  .topbar-title { font-size: 15px; }
  .semester-tag { display: none; }
  .status-dot { font-size: 11px; gap: 4px; }

  /* Content padding */
  .content { padding: 12px; }

  /* Grids */
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Stat cards */
  .stat-card { padding: 14px 16px; }
  .stat-val { font-size: 22px; }

  /* Tables - horizontal scroll */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: var(--radius-sm);
    margin: 0 -2px;
  }
  .data-table { min-width: 520px; font-size: 12.5px; }
  .data-table th, .data-table td { padding: 9px 10px; white-space: nowrap; }

  /* Cards */
  .card { padding: 14px 14px; }
  .card-hd { margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .card-title { font-size: 14px; }

  /* Buttons - smaller on mobile */
  .btn-sm { padding: 6px 10px; font-size: 11.5px; }

  /* Modal */
  .modal {
    margin: 0;
    width: 100%;
    max-width: 100%;
    min-height: 50vh;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 92vh;
    overflow-y: auto;
  }
  .modal-overlay {
    align-items: flex-end !important;
  }

  /* Hamburger button */
  #mob-toggle { display: flex !important; }

  /* Section headers */
  .section-title { font-size: 15px; }

  /* Form inside modal */
  .modal .form-group { margin-bottom: 10px; }
  .modal .form-input { font-size: 14px; padding: 10px 12px; }

  /* Bar charts */
  .bar-row { flex-wrap: wrap; }
  .bar-label { min-width: 80px; font-size: 11px; }

  /* Profile page */
  .profile-header { flex-direction: column; text-align: center; gap: 10px; }
  .profile-avatar { margin: 0 auto; }

  /* Action button row */
  .action-row { flex-wrap: wrap; gap: 6px; }
  .action-row .btn { font-size: 11.5px; }
}

/* Small phones */
@media (max-width: 380px) {
  .stats-grid { grid-template-columns: 1fr; }
  .role-tab span { display: none; }
  .topbar-right { gap: 6px; }
}

/* Prevent body scroll when sidebar is open */
body.sidebar-open { overflow: hidden; }

input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

let currentUser = null;

function setRole(r) {
  document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('role-'+(r==='mahasiswa'?'mhs':r)).classList.add('active');
  // Clear inputs when switching role
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  const user = DB.users.find(x => x.id===u && x.pass===p);
  if (!user) { showAlert('login-alert','Username atau password salah'); return; }
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name').textContent = user.nama;
  document.getElementById('user-role').textContent = user.role==='admin'?'Administrator':user.role==='dosen'?'Dosen':'Mahasiswa';
  const av = document.getElementById('user-avatar');
  av.textContent = user.nama[0];
  av.style.background = user.color;
  buildNav();
  navigate('dashboard');
}

function doLogout() {
  if (!confirm('Yakin ingin keluar?')) return;
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display='none', 3000);
}

// ═══ HELPERS ═══
function gradeClass(g){
  if(!g)return'g-e';
  if(g[0]==='A')return'g-a';if(g[0]==='B')return'g-b';
  if(g[0]==='C')return'g-c';if(g[0]==='D')return'g-d';return'g-e';
}
function calcGrade(na){
  if(na>=85)return'A';if(na>=80)return'A-';if(na>=75)return'B+';
  if(na>=70)return'B';if(na>=65)return'B-';if(na>=60)return'C+';
  if(na>=55)return'C';if(na>=50)return'D';return'E';
}
function calcNA(r){return Math.round(r.uts*.3+r.uas*.4+r.tugas*.2+r.hadir*.1);}

let toastTmr;
function showToast(msg, type='success') {
  clearTimeout(toastTmr);
  const t = document.getElementById('toast');
  const icons = {success:'check',danger:'x',info:'cloud',warning:'star'};
  t.innerHTML = (ICONS[icons[type]]||'') + msg;
  t.className = 'toast-'+type;
  t.style.display = 'flex';
  toastTmr = setTimeout(()=>t.style.display='none', 3000);
}
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(e) {
  if (e.target===document.getElementById('modal-overlay')) closeModalBtn();
}
function closeModalBtn() { document.getElementById('modal-overlay').style.display='none'; }

      [ICONS.mahasiswa,'Total Mahasiswa',total,`${aktif} aktif · ${total-aktif} non-aktif`,'#edf4f0','#4a7c59'],
      [ICONS.matakuliah,'Mata Kuliah',DB.matakuliah.length,[...new Set(DB.matakuliah.map(m=>m.prodi))].length+' prodi','#edf2f7','#4a6b8c'],

function filterMhs(){
  const q=document.getElementById('mhs-q').value.toLowerCase();

    DB.mahasiswa.filter(m=>(m.nama.toLowerCase().includes(q)||m.nim.includes(q))&&(!pr||m.prodi===pr)),
    currentUser.role!=='mahasiswa'
  );
}

function mkRows(data,canEdit){
  return data.map(m=>`<tr>
    <td><span class="pill pill-amber">${m.kode}</span></td>
    <td class="fw-600">${m.nama}</td>
    <td><span class="pill pill-blue">${m.sks} SKS</span></td>
    <td>${m.prodi}</td>
    <td class="text-sm">${m.dosen}</td>
    <td class="text-sm text-muted">${m.hari}, ${m.jam} · ${m.ruang}</td>
    ${canEdit?`<td><div class="actions">
      <button class="btn btn-ghost btn-sm" onclick="modalEditMK('${m.kode}')">${ICONS.edit} Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteMK('${m.kode}')">${ICONS.trash}</button>
    </div></td>`:''}
  </tr>`).join('')||`<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--text-muted)">Tidak ada data</td></tr>`;
}

function filterMK(){
  const q=document.getElementById('mk-q').value.toLowerCase();
  const pr=document.getElementById('mk-prodi').value;
  document.getElementById('mk-body').innerHTML=mkRows(DB.matakuliah.filter(m=>(m.nama.toLowerCase().includes(q)||m.kode.toLowerCase().includes(q))&&(!pr||m.prodi===pr)),currentUser.role!=='mahasiswa');
}

function modalAddMK(){

    <button class="btn btn-dark" onclick="saveMK()">${ICONS.save} Simpan</button>

}

function saveMK(){
  const kode=document.getElementById('mk-kode').value.trim();
  const nama=document.getElementById('mk-nama').value.trim();
  if(!kode||!nama){showToast('Kode dan Nama wajib diisi','danger');return;}
  if(DB.matakuliah.find(m=>m.kode===kode)){showToast('Kode sudah ada','danger');return;}
  DB.matakuliah.push({kode,nama,sks:+document.getElementById('mk-sks').value,semester:+document.getElementById('mk-sem').value,prodi:document.getElementById('mk-prodi2').value,dosen:document.getElementById('mk-dosen').value,hari:document.getElementById('mk-hari').value,jam:document.getElementById('mk-jam').value,ruang:document.getElementById('mk-ruang').value});

}

function modalEditMK(kode){

  <div class="modal-body">

      <div class="form-group"><label class="form-label">SKS</label><input class="form-input" id="emk-sks" type="number" value="${m.sks}" min="1" max="6"></div>

      <div class="form-group"><label class="form-label">Hari</label><select class="form-input" id="emk-hari">${['Senin','Selasa','Rabu','Kamis','Jumat'].map(h=>`<option ${m.hari===h?'selected':''}>${h}</option>`).join('')}</select></div>

function updateMK(kode){
  const m=DB.matakuliah.find(x=>x.kode===kode);
  m.nama=document.getElementById('emk-nama').value;m.sks=+document.getElementById('emk-sks').value;
  m.semester=+document.getElementById('emk-sem').value;m.dosen=document.getElementById('emk-dosen').value;
  m.hari=document.getElementById('emk-hari').value;m.jam=document.getElementById('emk-jam').value;
  m.ruang=document.getElementById('emk-ruang').value;
  closeModalBtn();showToast('Mata kuliah diperbarui');navigate('matakuliah');
}

function deleteMK(kode){
  if(!confirm(`Hapus mata kuliah ${kode}?`))return;
  DB.matakuliah.splice(DB.matakuliah.findIndex(m=>m.kode===kode),1);
  showToast('Mata kuliah dihapus','info');navigate('matakuliah');
}

// ── NILAI ──
PAGES.nilai = function(){
  const isMhs=currentUser.role==='mahasiswa';
  return `<div class="toolbar">
    ${!isMhs?`<div class="search-wrap"><span class="search-icon text-muted">${ICONS.search}</span><input class="form-input" id="n-q" placeholder="Cari NIM / nama…" oninput="filterNilai()"></div>`:''}
    <select class="filter-select" id="n-mk" onchange="filterNilai()">
      <option value="">Semua Mata Kuliah</option>
      ${DB.matakuliah.map(m=>`<option value="${m.kode}">${m.nama}</option>`).join('')}
    </select>
    ${!isMhs?`<button class="btn btn-dark" onclick="modalAddNilai()">${ICONS.plus} Input Nilai</button>`:''}
  </div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr>${!isMhs?'<th>NIM</th><th>Mahasiswa</th>':''}<th>Mata Kuliah</th><th>UTS</th><th>UAS</th><th>Tugas</th><th>Hadir</th><th>Nilai Akhir</th><th>Grade</th>${!isMhs?'<th>Aksi</th>':''}</tr></thead>
    <tbody id="nilai-body">${nilaiRows(isMhs?DB.nilai.filter(n=>n.nim===currentUser.nim):DB.nilai,isMhs)}</tbody>
  </table></div></div>`;
};

function nilaiRows(data,isMhs){
  return data.map(n=>{
    const mhs=DB.mahasiswa.find(m=>m.nim===n.nim);
    const mk=DB.matakuliah.find(m=>m.kode===n.kode);
    return `<tr>
      ${!isMhs?`<td><span class="pill pill-stone">${n.nim}</span></td><td class="fw-600">${mhs?mhs.nama:'-'}</td>`:''}
      <td>${mk?mk.nama:n.kode}</td>
      <td>${n.uts}</td><td>${n.uas}</td><td>${n.tugas}</td><td>${n.hadir}%</td>
      <td><span class="fw-700" style="font-size:15px">${n.nilai_akhir}</span></td>
      <td><span class="grade-badge ${gradeClass(n.grade)}">${n.grade}</span></td>
      ${!isMhs?`<td><div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="modalEditNilai('${n.nim}','${n.kode}')">${ICONS.edit}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteNilai('${n.nim}','${n.kode}')">${ICONS.trash}</button>
      </div></td>`:''}
    </tr>`;
  }).join('')||`<tr><td colspan="11" style="text-align:center;padding:28px;color:var(--text-muted)">Tidak ada data nilai</td></tr>`;
}

function filterNilai(){
  const isMhs=currentUser.role==='mahasiswa';
  const q=!isMhs&&document.getElementById('n-q')?document.getElementById('n-q').value.toLowerCase():'';
  const mk=document.getElementById('n-mk').value;
  const filtered=DB.nilai.filter(n=>{
    if(isMhs&&n.nim!==currentUser.nim)return false;
    const mhs=DB.mahasiswa.find(m=>m.nim===n.nim);
    return(!q||n.nim.includes(q)||(mhs&&mhs.nama.toLowerCase().includes(q)))&&(!mk||n.kode===mk);
  });
  document.getElementById('nilai-body').innerHTML=nilaiRows(filtered,isMhs);
}

function modalAddNilai(){
  openModal(`<div class="modal-header"><div class="modal-title">${ICONS.nilai} Input Nilai</div><button class="close-btn" onclick="closeModalBtn()">${ICONS.x}</button></div>
  <div class="modal-body">
    <div class="form-group mb-16"><label class="form-label">Mahasiswa</label><select class="form-input" id="n-nim">${DB.mahasiswa.map(m=>`<option value="${m.nim}">${m.nim} — ${m.nama}</option>`).join('')}</select></div>
    <div class="form-group mb-16"><label class="form-label">Mata Kuliah</label><select class="form-input" id="n-mk2">${DB.matakuliah.map(m=>`<option value="${m.kode}">${m.kode} — ${m.nama}</option>`).join('')}</select></div>
    <div class="grid-2 mb-16">
      <div class="form-group"><label class="form-label">UTS (30%)</label><input class="form-input" id="n-uts" type="number" min="0" max="100" value="75" oninput="prvNA()"></div>
      <div class="form-group"><label class="form-label">UAS (40%)</label><input class="form-input" id="n-uas" type="number" min="0" max="100" value="80" oninput="prvNA()"></div>
    </div>
    <div class="grid-2 mb-16">
      <div class="form-group"><label class="form-label">Tugas (20%)</label><input class="form-input" id="n-tugas" type="number" min="0" max="100" value="85" oninput="prvNA()"></div>
      <div class="form-group"><label class="form-label">Kehadiran (10%)</label><input class="form-input" id="n-hadir" type="number" min="0" max="100" value="90" oninput="prvNA()"></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
      <div class="text-sm text-muted fw-600" style="margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase">Preview Nilai Akhir</div>
      <div id="prv-val" style="font-size:38px;font-weight:900;color:var(--sidebar);letter-spacing:-1px">80</div>
      <div id="prv-grade" style="font-size:16px;font-weight:700;margin-top:4px;color:var(--text2)">B</div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModalBtn()">Batal</button>
    <button class="btn btn-dark" onclick="saveNilai()">${ICONS.save} Simpan</button>
  </div>`);
  prvNA();
}

function prvNA(){
  const na=calcNA({uts:+document.getElementById('n-uts')?.value||0,uas:+document.getElementById('n-uas')?.value||0,tugas:+document.getElementById('n-tugas')?.value||0,hadir:+document.getElementById('n-hadir')?.value||0});
  if(document.getElementById('prv-val'))document.getElementById('prv-val').textContent=na;
  if(document.getElementById('prv-grade'))document.getElementById('prv-grade').textContent=calcGrade(na);
}

function saveNilai(){
  const nim=document.getElementById('n-nim').value;
  const kode=document.getElementById('n-mk2').value;
  if(DB.nilai.find(n=>n.nim===nim&&n.kode===kode)){showToast('Nilai sudah ada, gunakan Edit','danger');return;}
  const uts=+document.getElementById('n-uts').value,uas=+document.getElementById('n-uas').value;
  const tugas=+document.getElementById('n-tugas').value,hadir=+document.getElementById('n-hadir').value;
  const na=calcNA({uts,uas,tugas,hadir});
  DB.nilai.push({nim,kode,uts,uas,tugas,hadir,nilai_akhir:na,grade:calcGrade(na)});
  closeModalBtn();showToast('Nilai berhasil disimpan');navigate('nilai');
}

function modalEditNilai(nim,kode){
  const n=DB.nilai.find(x=>x.nim===nim&&x.kode===kode);
  const mhs=DB.mahasiswa.find(m=>m.nim===nim);
  const mk=DB.matakuliah.find(m=>m.kode===kode);
  openModal(`<div class="modal-header"><div class="modal-title">${ICONS.edit} Edit Nilai</div><button class="close-btn" onclick="closeModalBtn()">${ICONS.x}</button></div>
  <div class="modal-body">
    <div style="background:var(--bg);border-radius:8px;padding:12px 14px;margin-bottom:16px" class="flex-between">

      <div class="form-group"><label class="form-label">UAS</label><input class="form-input" id="en-uas" type="number" min="0" max="100" value="${n.uas}" oninput="prvNA2()"></div>
    </div>
    <div class="grid-2 mb-16">
      <div class="form-group"><label class="form-label">Tugas</label><input class="form-input" id="en-tugas" type="number" min="0" max="100" value="${n.tugas}" oninput="prvNA2()"></div>
      <div class="form-group"><label class="form-label">Kehadiran %</label><input class="form-input" id="en-hadir" type="number" min="0" max="100" value="${n.hadir}" oninput="prvNA2()"></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
      <div class="text-sm text-muted fw-600" style="margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Nilai Akhir</div>
      <div id="prv-val2" style="font-size:38px;font-weight:900;color:var(--sidebar);letter-spacing:-1px">${n.nilai_akhir}</div>
      <div id="prv-grade2" style="font-size:16px;font-weight:700;margin-top:4px;color:var(--text2)">${n.grade}</div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModalBtn()">Batal</button>
    <button class="btn btn-dark" onclick="updateNilai('${nim}','${kode}')">${ICONS.save} Update</button>
  </div>`);
}

function prvNA2(){
  const na=calcNA({uts:+document.getElementById('en-uts')?.value||0,uas:+document.getElementById('en-uas')?.value||0,tugas:+document.getElementById('en-tugas')?.value||0,hadir:+document.getElementById('en-hadir')?.value||0});
  if(document.getElementById('prv-val2'))document.getElementById('prv-val2').textContent=na;
  if(document.getElementById('prv-grade2'))document.getElementById('prv-grade2').textContent=calcGrade(na);
}

function updateNilai(nim,kode){
  const n=DB.nilai.find(x=>x.nim===nim&&x.kode===kode);
  n.uts=+document.getElementById('en-uts').value;n.uas=+document.getElementById('en-uas').value;
  n.tugas=+document.getElementById('en-tugas').value;n.hadir=+document.getElementById('en-hadir').value;
  n.nilai_akhir=calcNA(n);n.grade=calcGrade(n.nilai_akhir);
  closeModalBtn();showToast('Nilai berhasil diperbarui');navigate('nilai');
}

function deleteNilai(nim,kode){
  if(!confirm('Hapus data nilai ini?'))return;
  DB.nilai.splice(DB.nilai.findIndex(n=>n.nim===nim&&n.kode===kode),1);
  showToast('Nilai dihapus','info');navigate('nilai');
}

function bkRows(){
  return DB.backups.map(b=>`<div class="backup-list-item">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;background:var(--bg2);border-radius:9px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)">
        ${b.tipe==='otomatis'?ICONS.robot:ICONS.person}
      </div>
      <div>
        <div class="fw-700" style="font-size:13.5px">${b.nama}</div>
        <div class="text-sm text-muted">${b.waktu} · ${b.ukuran}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="badge badge-success">${ICONS.check} ${b.status}</span>
      <button class="btn btn-ghost btn-sm" onclick="doRestore('${b.id}')">${ICONS.restore} Restore</button>
      <button class="btn btn-danger btn-sm" onclick="deleteBk('${b.id}')">${ICONS.trash}</button>
    </div>
  </div>`).join('')||`<div style="text-align:center;padding:24px;color:var(--text-muted)" class="text-sm">Belum ada backup tersimpan</div>`;
}

function doBackup(tipe){
  showToast('Memproses backup…','info');
  setTimeout(()=>{
    const ts=new Date().toLocaleString('id-ID',{dateStyle:'short',timeStyle:'short'});
    DB.backups.unshift({id:'bk'+Date.now(),nama:`Backup ${tipe==='manual'?'Manual':'Otomatis'}`,waktu:ts,ukuran:'2.5 MB',status:'sukses',tipe});
    showToast('Backup berhasil dibuat');
    document.getElementById('bk-list').innerHTML=bkRows();
  },1400);
}

function doRestore(id){
  if(!confirm('Restore backup ini? Data saat ini akan digantikan.'))return;
  showToast('Memproses restore…','info');
  setTimeout(()=>showToast('Restore berhasil'),2000);
}

function deleteBk(id){
  if(!confirm('Hapus backup ini?'))return;
  DB.backups.splice(DB.backups.findIndex(b=>b.id===id),1);
  showToast('Backup dihapus','info');
  document.getElementById('bk-list').innerHTML=bkRows();
}

function drawArch(){
  const cv=document.getElementById('arch-cv');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f5f4f0';ctx.fillRect(0,0,W,H);

  const boxes=[
    {x:16,y:155,w:110,h:52,l:'Pengguna',s:'Browser/Mobile',bg:'#edf2f7',bd:'#6b8fbf',tx:'#2d4a6e'},
    {x:160,y:50,w:120,h:50,l:'Cloud CDN',s:'Cache Global',bg:'#f7f0e6',bd:'#a07840',tx:'#6b4e1a'},
    {x:160,y:118,w:120,h:50,l:'Cloud Armor',s:'WAF / DDoS',bg:'#f7edec',bd:'#a06060',tx:'#6b2020'},
    {x:160,y:188,w:120,h:50,l:'Load Balancer',s:'Traffic Routing',bg:'#f0ede8',bd:'#7a7a62',tx:'#4a4a3a'},
    {x:322,y:80,w:118,h:50,l:'Cloud Run',s:'App Container',bg:'#edf2f7',bd:'#6b8fbf',tx:'#1e3a6a'},
    {x:322,y:148,w:118,h:50,l:'Firebase Auth',s:'JWT / RBAC',bg:'#f7f0e6',bd:'#a09040',tx:'#6b4e10'},
    {x:322,y:218,w:118,h:50,l:'Cloud Functions',s:'Background Jobs',bg:'#edf4f0',bd:'#5a8c6a',tx:'#1a4a2a'},
    {x:482,y:60,w:118,h:50,l:'Cloud SQL',s:'PostgreSQL HA',bg:'#edf4f0',bd:'#5a8c6a',tx:'#1a4a2a'},
    {x:482,y:128,w:118,h:50,l:'Memorystore',s:'Redis Cache',bg:'#f7edec',bd:'#a06060',tx:'#6b2020'},
    {x:482,y:198,w:118,h:50,l:'Cloud Storage',s:'Files & Backup',bg:'#edf2f7',bd:'#6b8fbf',tx:'#1e3a6a'},
    {x:322,y:300,w:118,h:46,l:'Monitoring',s:'Logs & Alerts',bg:'#f0ede8',bd:'#7a7a62',tx:'#4a4a3a'},
    {x:482,y:300,w:118,h:46,l:'Pub/Sub',s:'Event Bus',bg:'#f7f0e6',bd:'#a07840',tx:'#6b4e1a'},
  ];

  // draw connections
  const arcs=[[0,2],[0,1],[1,3],[2,3],[3,4],[3,5],[4,7],[4,8],[4,9],[4,6],[5,7],[6,10],[6,11],[7,10]];
  ctx.strokeStyle='#c8c5be';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  arcs.forEach(([a,b])=>{
    const s=boxes[a],t=boxes[b];
    ctx.beginPath();ctx.moveTo(s.x+s.w/2,s.y+s.h/2);ctx.lineTo(t.x+t.w/2,t.y+t.h/2);ctx.stroke();
  });
  ctx.setLineDash([]);

  // draw boxes
  boxes.forEach(b=>{
    ctx.save();
    ctx.fillStyle=b.bg;ctx.strokeStyle=b.bd;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=b.tx;ctx.font='bold 11.5px Inter,system-ui';ctx.textAlign='center';
    ctx.fillText(b.l,b.x+b.w/2,b.y+b.h/2-7);
    ctx.font='10px Inter,system-ui';ctx.fillStyle=b.tx+'bb';
    ctx.fillText(b.s,b.x+b.w/2,b.y+b.h/2+9);
    ctx.restore();
  });

  ctx.font='10px Inter,system-ui';ctx.fillStyle='#b0ae a6';ctx.textAlign='left';
  ctx.fillText('--- = Koneksi antar layanan',16,H-10);
}

window.addEventListener('resize',()=>{
  document.getElementById('mob-toggle').style.display=window.innerWidth<768?'flex':'none';
});

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const isOpen = sb.classList.contains('open');
  if (isOpen) {
    sb.classList.remove('open');
    ov.classList.remove('active');
    document.body.classList.remove('sidebar-open');
  } else {
    sb.classList.add('open');
    ov.classList.add('active');
    document.body.classList.add('sidebar-open');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('active');
  document.body.classList.remove('sidebar-open');
}

// Close sidebar on nav item click (mobile)
document.addEventListener('click', function(e) {
  if (window.innerWidth <= 768 && e.target.closest('.nav-item')) {
    setTimeout(closeSidebar, 150);
  }
});
